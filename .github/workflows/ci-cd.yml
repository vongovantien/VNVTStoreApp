name: VNVTStore CI/CD

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./VNVTStore.Backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build API
      run: dotnet build --no-restore --configuration Release

    - name: Run Application Tests
      run: dotnet test tests/VNVTStore.Application.Tests/VNVTStore.Application.Tests.csproj --configuration Release --verbosity normal

    - name: Run Domain Tests
      run: dotnet test tests/VNVTStore.Domain.Tests/VNVTStore.Domain.Tests.csproj --configuration Release --verbosity normal


    - name: Publish API
      run: dotnet publish src/VNVTStore.API/VNVTStore.API.csproj --configuration Release --output ${{ github.workspace }}/publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-app
        path: ${{ github.workspace }}/publish

  frontend:
    name: Frontend (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./VNVTStore.Frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./VNVTStore.Frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Tests
      run: npm test -- --run

    - name: Build
      run: npm run build

  deploy:
    name: Multi-Cloud Deployment
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 1. Backend Deployment to Render
    - name: Trigger Render Backend Deploy
      run: |
        curl -X POST ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}

    # 2. Frontend Deployment to Vercel
    - name: Deploy Frontend to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: ./
